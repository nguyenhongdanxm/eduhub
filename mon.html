<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chuyên môn – EduHub</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/style.css">
<style>
.bai-content img{max-width:100%;height:auto;border-radius:8px;margin:10px 0}
.bai-content p{margin:0.5em 0}
.bai-content ul,.bai-content ol{margin:0.5em 0 0.5em 1.4em}
.bai-content h3{font-weight:700;margin:0.8em 0 0.3em}
</style>
</head>
<body class="bg-slate-50 text-slate-800">
<nav class="bg-white border-b sticky top-0 z-50">
<div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
<a href="index.html" class="flex items-center gap-2 font-extrabold"><span class="w-9 h-9 bg-indigo-600 text-white rounded-lg flex items-center justify-center">E</span> EduHub</a>
<a href="index.html" class="text-sm text-indigo-600 font-semibold"><i class="fas fa-arrow-left mr-1"></i> Trang chủ</a>
</div>
</nav>
<div class="max-w-6xl mx-auto px-4 py-8">
<nav class="text-sm text-slate-500 mb-4" id="breadcrumb">
<a href="index.html" class="hover:text-indigo-600">Trang chủ</a>
<span class="mx-2">/</span>
<span id="bcSubject" class="text-slate-800 font-medium">...</span>
</nav>
<div class="mb-8">
<h1 id="pageTitle" class="text-2xl md:text-3xl font-extrabold mb-2">Đang tải...</h1>
<p id="pageDesc" class="text-slate-500"></p>
</div>
<div id="viewGrades" class="hidden">
<div class="text-xs font-semibold text-slate-400 mb-3 uppercase">Chọn lớp</div>
<div class="grid grid-cols-2 sm:grid-cols-5 gap-4" id="gradesList"></div>
</div>
<div id="viewLessons" class="hidden">
<button onclick="goBackToGrades()" class="text-sm text-indigo-600 font-semibold mb-4 flex items-center gap-1"><i class="fas fa-arrow-left"></i> Quay lại chọn lớp</button>
<div class="text-xs font-semibold text-slate-400 mb-3 uppercase">Mục lục theo bài · Sách Kết nối tri thức · Lớp <span id="lessonsGradeLabel"></span></div>
<div class="mb-3"><input id="lessonSearch" type="search" placeholder="Tìm bài trong mục lục..." oninput="filterLessons(this.value)" class="w-full border rounded-xl px-4 py-2.5 text-sm"></div>
<div class="space-y-2" id="lessonsList"></div>
</div>
<div id="viewBai" class="hidden">
<button onclick="goBackToLessons()" class="text-sm text-indigo-600 font-semibold mb-4 flex items-center gap-1"><i class="fas fa-arrow-left"></i> Quay lại mục lục</button>
<div id="baiDetail" class="bg-white border rounded-2xl p-6"></div>
</div>
</div>
<script src="assets/script.js"></script>
<script src="assets/admin.js"></script>
<script src="assets/bai-rich.js"></script>
<script>document.addEventListener('DOMContentLoaded',function(){if(typeof initData==='function')initData();if(typeof renderMonPage==='function')renderMonPage();});</script>
</body>
</html>
