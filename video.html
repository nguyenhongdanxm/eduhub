<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video YouTube – EduHub</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="bg-slate-50 text-slate-800">
<nav class="bg-white border-b sticky top-0 z-50">
<div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
<a href="index.html" class="flex items-center gap-2 font-extrabold"><span class="w-9 h-9 bg-indigo-600 text-white rounded-lg flex items-center justify-center">E</span> EduHub</a>
<a href="index.html" class="text-sm text-indigo-600 font-semibold"><i class="fas fa-arrow-left mr-1"></i> Trang chủ</a>
</div>
</nav>
<div class="max-w-6xl mx-auto px-4 py-8">
<nav class="text-sm text-slate-500 mb-4">
<a href="index.html" class="hover:text-indigo-600">Trang chủ</a>
<span class="mx-2">/</span>
<span class="text-slate-800 font-medium">Video YouTube</span>
</nav>
<h1 class="text-2xl md:text-3xl font-extrabold mb-2">Video YouTube</h1>
<p class="text-slate-500 mb-6">Bài giảng, nhạc trí nhớ theo lớp 1–5</p>
<div class="flex flex-wrap gap-2 mb-8 border-b pb-4" id="videoTabs">
<button onclick="switchVideoTab(0)" id="vtab-0" class="px-4 py-2 rounded-full text-sm font-semibold bg-indigo-600 text-white">Tất cả</button>
<button onclick="switchVideoTab(1)" id="vtab-1" class="px-4 py-2 rounded-full text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200">Lớp 1</button>
<button onclick="switchVideoTab(2)" id="vtab-2" class="px-4 py-2 rounded-full text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200">Lớp 2</button>
<button onclick="switchVideoTab(3)" id="vtab-3" class="px-4 py-2 rounded-full text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200">Lớp 3</button>
<button onclick="switchVideoTab(4)" id="vtab-4" class="px-4 py-2 rounded-full text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200">Lớp 4</button>
<button onclick="switchVideoTab(5)" id="vtab-5" class="px-4 py-2 rounded-full text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200">Lớp 5</button>
</div>
<div id="videoPageList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</div>
<script src="assets/script.js"></script>
<script>document.addEventListener('DOMContentLoaded',()=>{if(typeof initData==='function')initData();if(typeof renderVideoPage==='function')renderVideoPage(0);});</script>
</body>
</html>
