<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – EduHub Giáo viên Tiểu học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body class="bg-slate-100 text-slate-800">
<nav class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="index.html" class="font-extrabold text-lg flex items-center gap-2">
            <span class="w-9 h-9 bg-indigo-600 text-white rounded-lg flex items-center justify-center">E</span>
            Admin EduHub
        </a>
        <a href="index.html" class="text-sm text-indigo-600 font-semibold">← Về trang chủ</a>
    </div>
</nav>
<div class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-extrabold mb-6">Quản trị nội dung</h1>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-white rounded-xl p-4 border"><div class="text-2xl font-bold text-indigo-600" id="statTopics">0</div><div class="text-sm text-slate-500">Môn học</div></div>
        <div class="bg-white rounded-xl p-4 border"><div class="text-2xl font-bold text-emerald-600" id="statDocs">0</div><div class="text-sm text-slate-500">Tài nguyên</div></div>
        <div class="bg-white rounded-xl p-4 border"><div class="text-2xl font-bold text-rose-600" id="statVideos">0</div><div class="text-sm text-slate-500">Video</div></div>
        <div class="bg-white rounded-xl p-4 border"><div class="text-2xl font-bold text-amber-600" id="statUsers">0</div><div class="text-sm text-slate-500">Người dùng</div></div>
    </div>
    <div class="flex flex-wrap gap-2 mb-6">
        <button id="tab-mon" onclick="showTab('mon')" class="tab-btn active px-4 py-2 rounded-lg text-sm font-semibold">Môn học</button>
        <button id="tab-tn" onclick="showTab('tn')" class="tab-btn px-4 py-2 rounded-lg text-sm font-semibold">Tài nguyên (Giáo án)</button>
        <button id="tab-video" onclick="showTab('video')" class="tab-btn px-4 py-2 rounded-lg text-sm font-semibold">Video</button>
        <button id="tab-vb" onclick="showTab('vb')" class="tab-btn px-4 py-2 rounded-lg text-sm font-semibold">Văn bản</button>
        <button id="tab-faq" onclick="showTab('faq')" class="tab-btn px-4 py-2 rounded-lg text-sm font-semibold">Hỏi đáp</button>
        <button id="tab-app" onclick="showTab('app')" class="tab-btn px-4 py-2 rounded-lg text-sm font-semibold">Ứng dụng</button>
    </div>
    <div id="panel-mon" class="tab-panel">
        <div class="bg-white rounded-2xl border p-6 mb-6">
            <h3 class="font-bold mb-4">Thêm môn học</h3>
            <div class="grid md:grid-cols-3 gap-3">
                <input id="topicName" placeholder="Tên môn" class="border rounded-xl px-4 py-2.5 text-sm">
                <input id="topicDesc" placeholder="Mô tả ngắn" class="border rounded-xl px-4 py-2.5 text-sm">
                <input id="topicIcon" placeholder="Icon (fa-book-open)" value="fa-folder" class="border rounded-xl px-4 py-2.5 text-sm">
            </div>
            <button onclick="saveSubject()" class="mt-3 bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold">Thêm môn</button>
        </div>
        <div id="adminTopicsList" class="space-y-2"></div>
    </div>
    <div id="panel-tn" class="tab-panel hidden">
        <div class="bg-white rounded-2xl border p-6 mb-6">
            <h3 class="font-bold mb-4">Thêm giáo án / slide / đề / phiếu…</h3>
            <div class="grid md:grid-cols-2 gap-3 mb-3">
                <input id="resourceTitle" placeholder="Tiêu đề tài nguyên" class="border rounded-xl px-4 py-2.5 text-sm">
                <select id="resourceSubject" class="border rounded-xl px-4 py-2.5 text-sm"></select>
                <select id="resourceType" class="border rounded-xl px-4 py-2.5 text-sm">
                    <option>Giáo án</option><option>Slide</option><option>Đề kiểm tra</option>
                    <option>Phiếu bài tập</option><option>Kịch bản</option><option>Tài liệu</option>
                </select>
                <select id="resourceFormat" class="border rounded-xl px-4 py-2.5 text-sm">
                    <option>Word</option><option>PDF</option><option>PowerPoint</option><option>Hình ảnh</option>
                </select>
            </div>
            <textarea id="resourceDesc" placeholder="Mô tả ngắn" class="border rounded-xl px-4 py-2.5 text-sm w-full mb-3" rows="2"></textarea>
            <button onclick="saveResource()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold">Thêm tài nguyên</button>
        </div>
        <div id="adminResourcesList" class="space-y-2"></div>
    </div>
    <div id="panel-video" class="tab-panel hidden">
        <div class="bg-white rounded-2xl border p-6 mb-6">
            <h3 class="font-bold mb-4">Thêm video YouTube</h3>
            <div class="grid md:grid-cols-2 gap-3 mb-3">
                <input id="videoTitle" placeholder="Tiêu đề video" class="border rounded-xl px-4 py-2.5 text-sm">
                <input id="videoId" placeholder="Link hoặc ID YouTube" class="border rounded-xl px-4 py-2.5 text-sm">
                <input id="videoDuration" placeholder="Thời lượng" class="border rounded-xl px-4 py-2.5 text-sm">
                <select id="videoTopic" class="border rounded-xl px-4 py-2.5 text-sm"></select>
            </div>
            <button onclick="saveVideo()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold">Thêm video</button>
        </div>
        <div id="adminVideosList" class="space-y-2"></div>
    </div>
    <div id="panel-vb" class="tab-panel hidden">
        <div class="bg-white rounded-2xl border p-6 mb-6">
            <h3 class="font-bold mb-4">Thêm văn bản quy định</h3>
            <div class="grid md:grid-cols-3 gap-3 mb-3">
                <input id="vbTitle" placeholder="Tiêu đề văn bản" class="border rounded-xl px-4 py-2.5 text-sm md:col-span-2">
                <input id="vbYear" placeholder="Năm" class="border rounded-xl px-4 py-2.5 text-sm">
                <select id="vbType" class="border rounded-xl px-4 py-2.5 text-sm">
                    <option>Công văn</option><option>Thông tư</option><option>Quyết định</option><option>Hướng dẫn</option>
                </select>
            </div>
            <textarea id="vbContent" placeholder="Nội dung tóm tắt" class="border rounded-xl px-4 py-2.5 text-sm w-full mb-3" rows="3"></textarea>
            <button onclick="saveVanBan()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold">Thêm văn bản</button>
        </div>
        <div id="adminVanBanList" class="space-y-2"></div>
    </div>
    <div id="panel-faq" class="tab-panel hidden">
        <div class="bg-white rounded-2xl border p-6 mb-6">
            <h3 class="font-bold mb-4">Thêm hỏi đáp</h3>
            <input id="faqQ" placeholder="Câu hỏi" class="border rounded-xl px-4 py-2.5 text-sm w-full mb-3">
            <textarea id="faqA" placeholder="Câu trả lời" class="border rounded-xl px-4 py-2.5 text-sm w-full mb-3" rows="3"></textarea>
            <button onclick="saveFaq()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold">Thêm FAQ</button>
        </div>
        <div id="adminFaqList" class="space-y-2"></div>
    </div>
    <div id="panel-app" class="tab-panel hidden">
        <div class="bg-white rounded-2xl border p-6 mb-6">
            <h3 class="font-bold mb-4">Thêm ứng dụng hay</h3>
            <div class="grid md:grid-cols-2 gap-3 mb-3">
                <input id="appName" placeholder="Tên ứng dụng" class="border rounded-xl px-4 py-2.5 text-sm">
                <input id="appUrl" placeholder="Link" class="border rounded-xl px-4 py-2.5 text-sm">
                <input id="appDesc" placeholder="Mô tả" class="border rounded-xl px-4 py-2.5 text-sm">
                <input id="appIcon" placeholder="Icon" value="fa-link" class="border rounded-xl px-4 py-2.5 text-sm">
            </div>
            <button onclick="saveApp()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold">Thêm ứng dụng</button>
        </div>
        <div id="adminAppsList" class="space-y-2"></div>
    </div>
</div>
<script src="assets/script.js"></script>
</body>
</html>
